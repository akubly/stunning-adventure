name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 22 removed: vitest/rolldown native binding issue (rolldown-binding.linux-x64-gnu.node). Re-add when vitest resolves this.
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: tsc --build
      - run: npm run lint
      - run: npm run build
      - run: npm test
